name: Repository Analysis

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Analyse repository and send results
        env:
          WEBHOOK_ENDPOINT: ${{ secrets.WEBHOOK_ENDPOINT }}
          # Per-user token — primary auth method for /api/repo-changes
          ANALYSIS_TOKEN: ${{ secrets.ANALYSIS_TOKEN }}
          # Legacy global token — kept for /api/results admin endpoint
          WEBHOOK_API_TOKEN: ${{ secrets.WEBHOOK_API_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, subprocess, hashlib, mimetypes, math, sys
          import requests as req

          ENDPOINT = os.environ.get('WEBHOOK_ENDPOINT', '').rstrip('/')
          ANALYSIS_TOKEN = os.environ.get('ANALYSIS_TOKEN', '')
          WEBHOOK_API_TOKEN = os.environ.get('WEBHOOK_API_TOKEN', '')

          if not ENDPOINT:
              print("ERROR: WEBHOOK_ENDPOINT secret is not set")
              sys.exit(1)

          if not ANALYSIS_TOKEN and not WEBHOOK_API_TOKEN:
              print("ERROR: Neither ANALYSIS_TOKEN nor WEBHOOK_API_TOKEN is set")
              sys.exit(1)

          # ── Collect files ─────────────────────────────────────────
          files_data = []
          total_lines = code_lines = comment_lines = empty_lines = 0
          total_size = 0
          languages = {}
          binary_files = text_files = 0

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['.git', 'node_modules', '__pycache__', '.venv', 'venv']]
              for fname in files:
                  fpath = os.path.join(root, fname)
                  rel = fpath[2:]  # strip leading ./
                  try:
                      size = os.path.getsize(fpath)
                  except OSError:
                      continue
                  total_size += size
                  ext = os.path.splitext(fname)[1].lower()
                  mime, _ = mimetypes.guess_type(fname)
                  is_text = mime and mime.startswith('text') or ext in (
                      '.py','.js','.ts','.jsx','.tsx','.java','.c','.cpp','.h',
                      '.cs','.go','.rb','.php','.swift','.kt','.rs','.sh','.bash',
                      '.zsh','.fish','.ps1','.bat','.cmd','.yaml','.yml','.json',
                      '.xml','.html','.htm','.css','.scss','.sass','.less','.md',
                      '.txt','.rst','.toml','.ini','.cfg','.conf','.env','.sql',
                      '.r','.m','.scala','.lua','.dart','.ex','.exs','.elm',
                      '.hs','.clj','.cljs','.coffee','.vue','.svelte','.tf','.gradle',
                  )
                  if is_text:
                      text_files += 1
                      try:
                          with open(fpath, 'r', errors='replace') as fh:
                              lns = fh.readlines()
                          fl = cl = coml = el = 0
                          for ln in lns:
                              s = ln.strip()
                              fl += 1
                              if not s:
                                  el += 1
                              elif s.startswith(('#','//','/*','*','--','%','!')):
                                  coml += 1
                              else:
                                  cl += 1
                          total_lines += fl; code_lines += cl
                          comment_lines += coml; empty_lines += el
                          lang = ext.lstrip('.') or 'unknown'
                          languages[lang] = languages.get(lang, 0) + fl
                          files_data.append({
                              'path': rel, 'size': size,
                              'lines': fl, 'code': cl,
                              'comments': coml, 'empty': el,
                              'language': lang, 'is_binary': False,
                          })
                      except Exception:
                          binary_files += 1
                          files_data.append({'path': rel, 'size': size, 'is_binary': True})
                  else:
                      binary_files += 1
                      files_data.append({'path': rel, 'size': size, 'is_binary': True})

          result = {
              'repository': os.environ.get('GITHUB_REPOSITORY', ''),
              'is_private': None,   # unknown inside Actions; resolved server-side
              'event': os.environ.get('GITHUB_EVENT_NAME', ''),
              'branch': os.environ.get('GITHUB_REF_NAME', ''),
              'actor': os.environ.get('GITHUB_ACTOR', ''),
              'commit_sha': os.environ.get('GITHUB_SHA', ''),
              'run_id': os.environ.get('GITHUB_RUN_ID', ''),
              'run_number': int(os.environ.get('GITHUB_RUN_NUMBER', 0) or 0),
              'summary': {
                  'total_files': text_files + binary_files,
                  'text_files': text_files,
                  'binary_files': binary_files,
                  'total_lines': total_lines,
                  'code_lines': code_lines,
                  'comment_lines': comment_lines,
                  'empty_lines': empty_lines,
                  'unique_languages': len(languages),
                  'total_size_mb': round(total_size / 1_048_576, 4),
              },
              'languages': languages,
              'files': files_data[:500],   # cap to avoid huge payloads
          }

          # Write JSON for the upload-artifact step
          with open('enhanced_analysis_result.json', 'w') as f:
              json.dump(result, f)
          print(f"✅ Analysis complete: {result['summary']['total_files']} files, {result['summary']['code_lines']} code lines")

          # ── Send to server ────────────────────────────────────────
          url = ENDPOINT + '/api/repo-changes'
          # Primary: per-user analysis token
          headers = {
              'Content-Type': 'application/json',
              'X-Analysis-Token': ANALYSIS_TOKEN,
              # Keep legacy header for any intermediate proxy
              'X-API-Token': WEBHOOK_API_TOKEN,
          }
          try:
              resp = req.post(url, json=result, headers=headers, timeout=30)
              if resp.status_code in range(200, 300):
                  print(f"✅ Sent to server (HTTP {resp.status_code}): {resp.text[:200]}")
              else:
                  print(f"❌ Server returned HTTP {resp.status_code}: {resp.text[:500]}")
                  sys.exit(1)
          except Exception as e:
              print(f"❌ Request failed: {e}")
              sys.exit(1)
          PYEOF

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: enhanced-analysis-${{ github.run_id }}
          path: enhanced_analysis_result.json
          retention-days: 7
